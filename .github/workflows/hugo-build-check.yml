name: Hugo Build Check

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Hugo site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js (for Tailwind/Pagefind)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack and setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.14.0 --activate

      - name: Install Node dependencies
        working-directory: hugo-theme-academic-cv
        run: pnpm install --prefer-offline

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Pre-build Tailwind CSS
        working-directory: hugo-theme-academic-cv
        run: pnpm run css:build:once

      - name: Build
        working-directory: hugo-theme-academic-cv
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --gc --minify --baseURL "https://example.com/"

      - name: Generate Pagefind search index
        working-directory: hugo-theme-academic-cv
        run: pnpm dlx pagefind --site 'public' --verbose

      - name: Upload build artifact (public)
        if: always() && hashFiles('hugo-theme-academic-cv/public/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: hugo-public
          path: hugo-theme-academic-cv/public
          retention-days: 7
