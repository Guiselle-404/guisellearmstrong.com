name: PR Build Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

# Limit permissions to read-only for PR validation
permissions:
  contents: read

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Hugo Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.159.2"
          extended: true

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: /tmp/hugo_cache
          key: hugo-modules-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            hugo-modules-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.14.0"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
        if: hashFiles('pnpm-lock.yaml') != ''

      - name: Build site
        run: hugo --minify --noChmod
        env:
          HUGO_ENVIRONMENT: production

      - name: Upload build artifact (on failure for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-debug
          path: public/
          retention-days: 3

      - name: Check for build warnings
        run: |
          echo "Build completed successfully"
          echo "Output directory size: $(du -sh public/ | cut -f1)"
