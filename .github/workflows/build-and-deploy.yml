name: Build and Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hugo-theme-academic-cv
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.6"
          extended: true
          working-directory: hugo-theme-academic-cv

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.14.0"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Hugo modules
        run: hugo mod get

      - name: Build Hugo site
        run: hugo --minify

      - name: Prepare search index
        run: |
          find public -name '*.html' -exec sed -i 's/<body class="/<body data-pagefind-body class="/g' {} +
          find public -name '*.html' -exec sed -i 's/<body id="/<body data-pagefind-body id="/g' {} +
          pnpm run pagefind || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hugo-theme-academic-cv/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4