<!-- LinkedIn Connect Button -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Find the download resume button's container and add LinkedIn button
  const resumeBtn = document.querySelector('.mb-16 a[href*="resume"]');
  if (resumeBtn && resumeBtn.parentElement) {
    const linkedinBtn = document.createElement('a');
    linkedinBtn.href = 'https://www.linkedin.com/in/guisellearmstrong-12217760';
    linkedinBtn.target = '_blank';
    linkedinBtn.rel = 'noopener noreferrer';
    linkedinBtn.className = 'inline-flex items-center px-8 py-4 bg-[#0A66C2] hover:bg-[#004182] text-white font-bold text-lg rounded-xl shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300 ml-4';
    linkedinBtn.setAttribute('aria-label', 'Connect on LinkedIn');
    linkedinBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24" class="mr-3"><path d="M20.5 3h-17A1.5 1.5 0 002 4.5v15A1.5 1.5 0 003.5 21h17a1.5 1.5 0 001.5-1.5v-15A1.5 1.5 0 0020.5 3zM8 18H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.75 1.75 0 01-1.8 1.75zM19 18h-3v-4.75c0-1.22-.46-2.05-1.5-2.05-1 0-1.6.69-1.6 1.78V15.5v3h-3v-9h3v1.3a3.3 3.3 0 013-1.55c2.2 0 2.6 1.45 2.6 3.32z"/></svg>Connect on LinkedIn';
    resumeBtn.parentElement.appendChild(linkedinBtn);
    // Make the container a flex wrapper so both buttons sit side by side
    resumeBtn.parentElement.classList.add('flex', 'flex-wrap', 'items-center', 'gap-4');
  }
});
</script>
